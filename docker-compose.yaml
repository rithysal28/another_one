version: '3.8'

services:
  web:
    build: .
    ports:
      - "8092:8092"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres-db:5432/cafe_db
      - MINIO_ENDPOINT=http://minio-storage:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - BUCKET_NAME=cafe-data
    networks:
      - coolify
    depends_on:
      - minio-storage
      - postgres-db

  minio-storage:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    networks:
      - coolify

  postgres-db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cafe_db
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - coolify

volumes:
  minio-data:
  pg-data:

networks:
  coolify:
    external: true