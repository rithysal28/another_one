version: '3.8'

services:
  # 1. Your Node.js Application
  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8092:8092"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      # Point to the internal container name "minio-storage" on port 9000
      - MINIO_ENDPOINT=http://minio-storage:9000
      - MINIO_ACCESS_KEY=rithysal_access_key
      - MINIO_SECRET_KEY=rithysal_secret_secure_key
      - MINIO_BUCKET=project-media
    command: sh -c "npm install && npm start"
    restart: always
    depends_on:
      minio-storage:
        condition: service_healthy # Wait until MinIO is fully ready before starting the app

  # 2. The MinIO S3 Object Storage Service
  minio-storage:
    image: minio/minio:RELEASE.2024-05-10T01-38-56Z
    ports:
      - "9000:9000" # S3 API Data Transfer Port
      - "9001:9001" # Web Admin Console UI Port
    environment:
      - MINIO_ROOT_USER=rithysal_access_key
      - MINIO_ROOT_PASSWORD=rithysal_secret_secure_key
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always
    # Keeps the container from rushing ahead until the server API is responsive
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 3

# Named volume ensures your uploaded files survive when containers restart or rebuild
volumes:
  minio_data: