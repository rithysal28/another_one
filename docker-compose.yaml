version: '3.8'

services:
  web:
    build: .
    ports:
      - "8092:8092"
    environment:
      - NODE_ENV=production
      # Add any S3 or MinIO environment variables your server.js needs here
    depends_on:
      - minio-storage

  minio-storage:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword

volumes:
  minio-data: